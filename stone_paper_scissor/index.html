<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone-Paper-Scissor Game</title>
    <link rel = "stylesheet" href="style.css">
</head>
<body>
    <div class="player1">
        <div class="signs p1">
            <button class = "circle p1-color" id="p1-rock"></button>
            <button class = "circle p1-color" id="p1-paper"></button>
            <button class = "circle p1-color" id="p1-scissor"></button>
        </div>
    </div>
    <div class="player2">
        <div class="signs p2">
            <button class = "circle p2-color" id="p2-rock"></button>
            <button class = "circle p2-color" id="p2-paper"></button>
            <button class = "circle p2-color" id="p2-scissor"></button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
